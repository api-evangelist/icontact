aid: icontact
name: iContact
description: >-
  iContact is an email marketing and marketing automation platform (now
  part of Cision) that helps small and mid-market businesses build email
  campaigns, manage contacts and lists, automate drip sequences, and
  measure engagement. The iContact REST API v2.2 provides programmatic
  access to contacts, lists, segments, campaigns, messages, and reporting
  data using a combination of HTTP headers (API-AppId, API-Version,
  API-Username, API-Password) for authentication.
type: Index
